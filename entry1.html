<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entry 01</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="entry-page cloud-page image-only-page" data-page="cloud" data-entry-id="entry1">

  <div class="noise"></div>
  <div class="vignette"></div>

  <div class="floating-orbs" id="floatingOrbs">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="orb orb-4"></span>
    <span class="orb orb-5"></span>
    <span class="orb orb-6"></span>
  </div>

  <!-- TEXTLESS BACK BUTTON -->
  <a href="index.html" class="back-home-link" aria-label="Back to archive"></a>

  <main class="image-only-shell">
    <div class="dream-scene cloud-scene full-image-scene dissolve-scene" id="cloudScene">

      <div class="blink-mask top-blink"></div>
      <div class="blink-mask bottom-blink"></div>

      <div class="memory-bleed" id="memoryBleed"></div>

      <div class="image-layer ghost-layer ghost-layer-1"></div>
      <div class="image-layer ghost-layer ghost-layer-2"></div>

      <img
        src="images/dream1.PNG"
        alt="Entry 01"
        class="dream-image main-image"
        id="cloudImage"
      />

      <div class="click-pulse-layer" id="cloudPulse"></div>
      <div class="dissolve-layer" id="cloudDissolve"></div>

      <div class="image-glow"></div>
      <div class="scene-lines"></div>

      <div class="memory-fragments">
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
