<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entry 02</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="entry-page field-page image-only-page" data-page="field" data-entry-id="entry2">

  <div class="noise"></div>
  <div class="vignette"></div>

  <div class="floating-orbs" id="floatingOrbs">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
    <span class="orb orb-4"></span>
    <span class="orb orb-5"></span>
    <span class="orb orb-6"></span>
  </div>

  

  <main class="image-only-shell">
    <div class="dream-scene field-scene full-image-scene dissolve-scene" id="fieldScene">
      <div class="blink-mask top-blink"></div>
      <div class="blink-mask bottom-blink"></div>

      <div class="memory-bleed" id="memoryBleed"></div>

      <canvas id="fieldCanvas"></canvas>
      <div class="image-layer ghost-layer ghost-layer-1"></div>
      <div class="image-layer ghost-layer ghost-layer-2"></div>
      <img src="images/dream2.PNG" alt="Entry 02" class="dream-image main-image" id="fieldImage" />

      <div class="click-pulse-layer" id="fieldPulse"></div>
      <div class="dissolve-layer" id="fieldDissolve"></div>

      <div class="field-haze"></div>
      <div class="image-glow"></div>
      <div class="scene-lines"></div>

      <div class="memory-fragments">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

   <a href="index.html" class="back-home-link" aria-label="Back to archive"></a>
  </main>

  <script src="script.js"></script>
</body>
</html>
